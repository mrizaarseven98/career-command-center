name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  macos:
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Test plugin, app, integrations, and updater
        run: APP_ARCHITECTURES='arm64 x86_64' scripts/test_macos_app.sh
      - name: Upload tested app bundle
        uses: actions/upload-artifact@v4
        with:
          name: Career-Command-Center-tested-app
          path: build/Career Command Center.app
          if-no-files-found: error
